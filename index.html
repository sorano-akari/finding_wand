<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>たずね人ステッキ・シミュレーター</title>
    <style>
        :root { 
            --dora-blue: #00A0E9;
            --dora-red: #ED1C24;
            --bg-dark: #121212;
            --ui-dark: #1a1a1a;
        }
        
        body { 
            margin: 0; 
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark); 
            font-family: sans-serif; 
            color: white; 
            overflow: hidden;
        }

        header { flex-shrink: 0; z-index: 10; border-bottom: 2px solid var(--dora-blue); }
        .top-bar { 
            background: #151515; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .visitor-box { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: bold; color: var(--dora-blue); }
        .visitor-box img { height: 18px; border-radius: 2px; }

        #guide-text { 
            background: #222; padding: 12px; font-size: 12px; text-align: center; 
            line-height: 1.6; color: #eee; border-top: 1px solid #333;
        }
        .mission-text { font-size: 14px; font-weight: bold; display: block; margin-bottom: 4px; color: #fff; }
        .highlight-blue { color: var(--dora-blue); font-weight: bold; }
        .highlight-red { color: #ff6b6b; font-weight: bold; }

        main { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
            background: #151515;
        }
        canvas { display: block; width: 100%; height: 100%; }

        #giveup-btn { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            font-size: 11px; 
            font-weight: bold;
            color: #fff; 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid #444; 
            padding: 8px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            pointer-events: auto;
        }

        footer {
            flex-shrink: 0;
            background: #1a1a1a;
            padding: 15px 10px calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btns-row { display: flex; gap: 8px; }
        .speed-btns, .acc-btns { 
            display: flex; gap: 4px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 30px; 
        }
        .speed-btns button, .acc-btns button { 
            padding: 8px 14px; border: none; background: transparent; border-radius: 20px; 
            font-size: 12px; color: #888; cursor: pointer; 
        }
        .speed-btns button.active, .acc-btns button.active { background: var(--dora-blue); color: white; font-weight: bold; }
        .acc-btns button.active { background: var(--dora-red); }

        #find-btn { 
            width: 90%; max-width: 320px; padding: 14px; font-size: 18px; font-weight: bold; 
            border-radius: 30px; background: #333; color: #555; border: 1px solid #444; 
        }
        #find-btn.lit { background: var(--dora-red); color: white; border: 1px solid white; box-shadow: 0 0 20px var(--dora-red); animation: glow 0.6s infinite alternate; }
        
        #stick-btn { 
            width: 70px; height: 70px; border-radius: 50%; background: var(--dora-red); 
            border: 4px solid white; color: white; font-weight: bold; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #reset-btn { width: 90%; max-width: 320px; padding: 14px; font-size: 20px; font-weight: bold; border-radius: 30px; background: gold; color: black; border: 2px solid white; cursor: pointer; display: none; }
        
        @keyframes glow { from { opacity: 0.8; } to { opacity: 1; transform: scale(1.02); } }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div class="visitor-box">CLEAR: <span id="clear-count" style="color:white; font-size:14px;">0</span></div>
        <div style="font-weight: bold; font-size: 15px; letter-spacing: 1px;">たずね人ステッキ</div>
        <div class="visitor-box">
            アクセス件数: 
            <img src="https://hits.dwyl.com/sorano-akari/finding_wand.svg?style=flat-square&color=00A0E9" alt="hits">
        </div>
    </div>
    <div id="guide-text">
        <span class="mission-text">🎯 見えない「たずね人」を探し出そう！</span>
        🪄 ステッキを上手に使って、<span class="highlight-blue">なるべく少ない回数</span>でたずね人を見つけよう！<br>
        ステッキが指した方向にまっすぐ進むと、確率でターゲットが見つかるよ。
    </div>
</header>

<main id="container">
    <canvas id="gameCanvas"></canvas>
    <button id="giveup-btn" onclick="cheatMode = !cheatMode">答えを見る</button>
</main>

<footer>
    <div class="btns-row">
        <div class="speed-btns">
            <button id="sp-5" onclick="setSpeed(5)">🚶 5</button>
            <button id="sp-20" onclick="setSpeed(20)" class="active">🏃 20</button>
            <button id="sp-100" onclick="setSpeed(100)">🚀 100</button>
        </div>
        <div class="acc-btns">
            <button id="acc-70" onclick="setAccuracy(1.04, 70)" class="active">🎯 70%</button>
            <button id="acc-50" onclick="setAccuracy(0.67, 50)">⚖️ 50%</button>
            <button id="acc-20" onclick="setAccuracy(0.25, 20)">🎲 20%</button>
        </div>
    </div>
    <button id="find-btn" onclick="attemptClear()">ターゲット未発見</button>
    <button id="reset-btn" onclick="resetGame()">🌟 もう一度探す 🌟</button>
    <button id="stick-btn" onclick="useStick()">🪄<span id="battery" style="font-size:10px">🔋 5/5</span></button>
</footer>

<script data-goatcounter="https://sorano-akari-academy.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('container');
    const WORLD_SIZE = 1000;
    const VIEW_RADIUS = 50, VIEW_ANGLE = 30 * Math.PI / 180;
    let player = { x: 0, y: 0, angle: 0, isMoving: false };
    let target = { x: 0, y: 0, found: false }, battery = 5, currentSpeed = 20, isSlowMo = false, cheatMode = false, lastLog = null, scale = 1, piconTimer = 0, clearImage, totalClears = 0;
    let precisionZ = 1.04;

    function init() {
        resize();
        player.x = Math.random() * WORLD_SIZE; player.y = Math.random() * WORLD_SIZE;
        target.x = Math.random() * WORLD_SIZE; target.y = Math.random() * WORLD_SIZE;
        player.angle = Math.random() * Math.PI * 2;
        piconTimer = 180;
        clearImage = new Image(); clearImage.src = 'clear.png'; 
        if(!window.loopStarted) { requestAnimationFrame(loop); window.loopStarted = true; }
    }

    function setSpeed(s) { if(isSlowMo) return; currentSpeed = s; document.querySelectorAll('.speed-btns button').forEach(b => b.classList.remove('active')); document.getElementById('sp-'+s).classList.add('active'); }
    function setAccuracy(z, label) { if(isSlowMo || target.found) return; precisionZ = z; document.querySelectorAll('.acc-btns button').forEach(b => b.classList.remove('active')); document.getElementById('acc-'+label).classList.add('active'); }

    function useStick() {
        if(battery <= 0 || player.isMoving || isSlowMo || target.found) return;
        const dx = target.x - player.x, dy = target.y - player.y, dist = Math.sqrt(dx*dx+dy*dy);
        const sigma = Math.asin(Math.min(1, 10/dist)) / precisionZ;
        player.angle = Math.atan2(dy, dx) + (Math.sqrt(-2*Math.log(Math.random()||1))*Math.cos(2*Math.PI*Math.random())*sigma);
        lastLog = { x: player.x, y: player.y, angle: player.angle };
        battery--; document.getElementById('battery').innerText = `🔋 ${battery}/5`;
        if(battery===0) document.getElementById('stick-btn').disabled = true;
    }

    function loop() {
        if(player.isMoving && !target.found) {
            let s = isSlowMo ? 10.0 : currentSpeed;
            player.x += Math.cos(player.angle)*(s/60); player.y += Math.sin(player.angle)*(s/60);
            player.x = Math.max(0, Math.min(WORLD_SIZE, player.x));
            player.y = Math.max(0, Math.min(WORLD_SIZE, player.y));
            updateCollision();
        }
        draw(); requestAnimationFrame(loop);
    }

    function updateCollision() {
        if(target.found) return;
        const dx = target.x - player.x, dy = target.y - player.y, dist = Math.sqrt(dx*dx+dy*dy);
        const relAngle = normalizeAngle(Math.atan2(dy, dx) - player.angle);
        let inSight = (dist <= VIEW_RADIUS && Math.abs(relAngle) <= VIEW_ANGLE);
        const btn = document.getElementById('find-btn');
        if(inSight) {
            if(!isSlowMo) { isSlowMo = true; btn.classList.add('lit'); btn.innerText = "発見！押してクリア"; }
        } else if(isSlowMo) { isSlowMo = false; btn.classList.remove('lit'); btn.innerText = "ターゲット未発見"; }
    }

    function attemptClear() {
        if(isSlowMo) {
            target.found = true; isSlowMo = false; player.isMoving = false;
            totalClears++; document.getElementById('clear-count').innerText = totalClears;
            document.getElementById('find-btn').style.display = "none";
            document.getElementById('reset-btn').style.display = "block";
            document.getElementById('stick-btn').style.display = "none";
        }
    }

    function resetGame() {
        target.found = false; battery = 5; lastLog = null; isSlowMo = false; player.isMoving = false; cheatMode = false;
        document.getElementById('battery').innerText = `🔋 5/5`;
        document.getElementById('stick-btn').style.display = "flex"; document.getElementById('stick-btn').disabled = false;
        document.getElementById('find-btn').style.display = "block"; document.getElementById('find-btn').innerText = "ターゲット未発見";
        document.getElementById('find-btn').classList.remove('lit');
        document.getElementById('reset-btn').style.display = "none";
        init();
    }

    function draw() {
        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(scale, scale); ctx.translate(-WORLD_SIZE/2, -WORLD_SIZE/2);
        ctx.strokeStyle = "#444"; ctx.lineWidth = 2/scale; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        ctx.strokeStyle = "#2a2a2a"; ctx.lineWidth = 1/scale;
        for(let i=0; i<=WORLD_SIZE; i+=100) { 
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, WORLD_SIZE); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(WORLD_SIZE, i); ctx.stroke(); 
        }
        if(lastLog) {
            ctx.save(); ctx.translate(lastLog.x, lastLog.y); ctx.rotate(lastLog.angle);
            ctx.strokeStyle = "rgba(0,160,233,0.7)"; ctx.lineWidth = 4/scale;
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(WORLD_SIZE*2,0); ctx.stroke(); ctx.restore();
        }
        if(target.found || isSlowMo || cheatMode) {
            ctx.fillStyle = target.found ? "gold" : "rgba(255, 0, 0, 0.8)";
            ctx.beginPath(); ctx.arc(target.x, target.y, 5/scale, 0, 7); ctx.fill();
        }
        if (piconTimer > 0) {
            const ring = (180 - piconTimer) % 60 / 60;
            ctx.beginPath(); ctx.arc(player.x, player.y, (10 + ring * 60)/scale, 0, 7);
            ctx.strokeStyle = `rgba(0,160,233,${1-ring})`; ctx.lineWidth = 2/scale; ctx.stroke();
            piconTimer--;
        }
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.angle);
        ctx.fillStyle = isSlowMo ? "rgba(255,239,0,0.6)" : "rgba(255,255,255,0.2)";
        ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,VIEW_RADIUS,-VIEW_ANGLE,VIEW_ANGLE); ctx.fill();
        ctx.fillStyle = "#00A0E9"; ctx.beginPath(); ctx.arc(0,0,4/scale,0,7); ctx.fill(); ctx.strokeStyle="white"; ctx.lineWidth=2/scale; ctx.stroke();
        ctx.restore(); ctx.restore();

        if (target.found) {
            ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            if (clearImage && clearImage.complete) {
                const s = Math.min(canvas.width/clearImage.width, canvas.height/clearImage.height)*0.5; 
                const iw = clearImage.width*s, ih = clearImage.height*s;
                ctx.drawImage(clearImage, (canvas.width-iw)/2, (canvas.height-ih)/2 - 80, iw, ih); 
            }
            ctx.fillStyle = "gold"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
            
            // 【修正】クリア回数に応じてメッセージを分岐
            if (totalClears === 1) {
                ctx.fillText("2回のステッキ使用でほぼ100％の確率で見つけられる方法があるよ！", canvas.width/2, canvas.height*0.8);
                ctx.fillText("考えてみよう！", canvas.width/2, canvas.height*0.8 + 25);
            } else {
                ctx.fillText("異なる２点からステッキをふって、", canvas.width/2, canvas.height*0.8);
                ctx.fillText("交わるあたりをさがすと・・・？", canvas.width/2, canvas.height*0.8 + 25);
            }
        }
    }

    function normalizeAngle(a) { while(a < -Math.PI) a += Math.PI*2; while(a > Math.PI) a -= Math.PI*2; return a; }
    
    function resize() { 
        canvas.width = container.clientWidth; 
        canvas.height = container.clientHeight; 
        scale = Math.min(canvas.width, canvas.height) / (WORLD_SIZE * 1.4); 
    }
    
    canvas.addEventListener('pointerdown', (e) => {
        if(target.found || isSlowMo) return;
        const r = canvas.getBoundingClientRect();
        if(player.isMoving) {
            player.isMoving = false;
        } else {
            const tx = (e.clientX - r.left - r.width / 2) / scale + WORLD_SIZE / 2;
            const ty = (e.clientY - r.top - r.height / 2) / scale + WORLD_SIZE / 2;
            player.angle = Math.atan2(ty - player.y, tx - player.x);
            player.isMoving = true;
        }
    });
    window.onresize = resize; init();
</script>
</body>
</html>
